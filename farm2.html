<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ферма с зумом</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
*{margin:0;padding:0;overflow:hidden}
canvas{background:#2d5a1e;display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var c=document.getElementById("c"),ctx=c.getContext("2d");
c.width=window.innerWidth;c.height=window.innerHeight;

// Камера
var cam={x:0,y:0,zoom:1};
var dragging=false,lastX=0,lastY=0;

// Поле
var tiles=[],animals=[];
for(var i=0;i<10;i++)for(var j=0;j<10;j++)tiles.push({x:i*80,y:j*80,crop:Math.random()>0.5?"wheat":"",stage:Math.random()*3});
for(var i=0;i<3;i++)animals.push({x:Math.random()*800,y:Math.random()*800,type:"chicken",dx:Math.random()*2-1,dy:Math.random()*2-1});

// Зум колёсиком
c.addEventListener("wheel",function(e){e.preventDefault();cam.zoom*=e.deltaY>0?0.9:1.1;});
// Drag мышкой
c.addEventListener("mousedown",function(e){dragging=true;lastX=e.clientX;lastY=e.clientY;});
c.addEventListener("mouseup",function(){dragging=false;});
c.addEventListener("mousemove",function(e){if(dragging){cam.x+=(e.clientX-lastX)/cam.zoom;cam.y+=(e.clientY-lastY)/cam.zoom;lastX=e.clientX;lastY=e.clientY;}});
// Drag пальцем
c.addEventListener("touchstart",function(e){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;});
c.addEventListener("touchend",function(){dragging=false;});
c.addEventListener("touchmove",function(e){if(dragging){cam.x+=(e.touches[0].clientX-lastX)/cam.zoom;cam.y+=(e.touches[0].clientY-lastY)/cam.zoom;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}});

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.save();
  ctx.translate(c.width/2,c.height/2);
  ctx.scale(cam.zoom,cam.zoom);
  ctx.translate(-cam.x,-cam.y);
  // Трава
  ctx.fillStyle="#3a7a1e";
  ctx.fillRect(0,0,800,800);
  // Грядки
  for(var t of tiles){
    ctx.fillStyle="#8B4513";
    ctx.fillRect(t.x,t.y,70,70);
    if(t.crop){
      ctx.fillStyle=t.stage<1?"#4CAF50":t.stage<2?"#388E3C":"#FFD700";
      ctx.fillRect(t.x+15,t.y+15,40,40);
    }
  }
  // Животные
  for(var a of animals){
    a.x+=a.dx;a.y+=a.dy;
    if(a.x<0||a.x>800)a.dx*=-1;
    if(a.y<0||a.y>800)a.dy*=-1;
    ctx.fillStyle=a.type=="chicken"?"#fff":"#8B4513";
    ctx.fillRect(a.x,a.y,20,20);
    ctx.fillText(a.type,a.x,a.y-5);
  }
  ctx.restore();
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
